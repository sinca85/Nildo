name: Update Nildo Reels

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  update-reels:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install cheerio

      - name: Run reels updater
        run: node .github/scripts/update-reels.mjs

      - name: Debug generated files
        run: |
          echo "Repo root:"
          pwd
          echo "Data folder:"
          ls -la data || true
          echo "Preview reels.json:"
          cat data/reels.json || true
          echo "Preview reels-debug.html exists?"
          ls -la data/reels-debug.html || true

      - name: Commit changes if reels.json changed
        run: |
          if git diff --quiet -- data/reels.json; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/reels.json
          git commit -m "chore: update reels cache"
          git push